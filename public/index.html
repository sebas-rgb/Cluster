<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios - Supabase</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
        --danger: #ef4444;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Segoe UI, system-ui, sans-serif;
        background: radial-gradient(circle at top, #1e293b, #0f172a 60%);
        color: var(--text);
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      button {
        background: var(--accent);
        color: #052e16;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
      }

      .muted { color: var(--muted); }
      .error { color: var(--danger); }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        overflow: hidden;
      }

      th, td {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 10px;
        text-align: left;
        vertical-align: top;
        font-size: 0.95rem;
      }

      th {
        color: #cbd5e1;
        background: rgba(255, 255, 255, 0.03);
        position: sticky;
        top: 0;
      }

      .table-wrap {
        overflow: auto;
        max-height: 60vh;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Tabla usuarios (Supabase)</h1>
        <div class="row">
          <button id="reloadBtn">Recargar</button>
          <span id="status" class="muted">Cargando...</span>
          <span id="count" class="muted"></span>
        </div>
        <div id="tableContainer" class="table-wrap"></div>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
